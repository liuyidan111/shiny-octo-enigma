
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>画之境 | 个人美术作品集</title>
    <style>
        /* ---------- 全局样式 & CSS变量（暗色/亮色主题） ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s;
        }

        /* 亮色主题 (默认) */
        :root {
            --bg-body: #faf8f5;
            --bg-header: #ffffff;
            --text-primary: #2c2c2c;
            --text-secondary: #5a5a5a;
            --accent: #607D8B;
            --accent-hover: #4FC3F7;
            --card-bg: #ffffff;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.05);
            --border-light: #eae6e0;
            --footer-bg: #f0ede8;
            --nav-link: #3b3b3b;
            --hover-bg: #f3efe9;
        }

        /* 暗色主题 */
        body.dark {
            --bg-body: #1e1e2a;
            --bg-header: #2a2a2f;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --accent: #64B5F6;
            --accent-hover: #0D47A1;
            --card-bg: #2f2f36;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.3);
            --border-light: #3e3e46;
            --footer-bg: #25252c;
            --nav-link: #dddddd;
            --hover-bg: #3a3a42;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 0;
            margin: 0;
        }

        /* 容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ========== 头部 + 导航 ========== */
        .site-header {
            background-color: var(--bg-header);
            backdrop-filter: blur(2px);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 1rem 0;
        }

        .logo h1 {
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            font-weight: 600;
            background: linear-gradient(120deg, var(--accent), #3F51B5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* 导航菜单 */
        .nav-menu ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-menu a {
            text-decoration: none;
            font-weight: 500;
            color: var(--nav-link);
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.2s;
        }

        /* 悬停效果 (hover) */
        .nav-menu a:hover {
            color: var(--accent);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.25s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: var(--hover-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* 主区域 */
        main {
            min-height: 70vh;
            padding: 2.5rem 0;
        }

        /* 作品列表页 (网格布局) 桌面端≥992px */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin: 2rem 0;
        }

        /* 作品卡片 */
        .art-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s;
            border: 1px solid var(--border-light);
        }
        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
        }
        .card-info {
            padding: 1.2rem;
        }
        .card-info h3 {
            font-size: 1.3rem;
            margin-bottom: 0.4rem;
        }
        .card-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 详情页区域 */
        .detail-container {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            max-width: 900px;
            margin: 0 auto;
        }
        .detail-img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 24px;
            background: #f1f1f1;
            margin-bottom: 1.5rem;
        }
        .detail-title {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }
        .detail-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: var(--accent-hover);
        }

        /* CSS动画: 淡入+上浮效果 (应用于卡片或者标题) */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeup {
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* footer */
        .site-footer {
            background-color: var(--footer-bg);
            border-top: 1px solid var(--border-light);
            padding: 2rem 0;
            text-align: center;
            margin-top: 3rem;
            color: var(--text-secondary);
        }

        /* 响应式布局: 手机端 (≤767px) 单列显示 */
        @media (max-width: 767px) {
            .art-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .header-inner {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-menu ul {
                gap: 1.2rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .container {
                padding: 0 18px;
            }
            .detail-title {
                font-size: 1.6rem;
            }
        }

        /* 平板中等适配 768px-991px 两列 */
        @media (min-width: 768px) and (max-width: 991px) {
            .art-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 加载占位 */
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--accent);
        }

        /* 交互动态高亮 */
        .active-nav {
            color: var(--accent) !important;
            font-weight: 600;
        }
        button {
            background: none;
            border: none;
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container header-inner">
        <div class="logo">
            <h1>🎨 画之境</h1>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="#/" data-page="list" class="nav-link active-nav">作品集</a></li>
                <li><a href="#/about" data-page="about" class="nav-link">关于我</a></li>
            </ul>

        <button class="theme-toggle" id="themeToggleBtn">🌓 暗色主题</button>
    </div>
</header>

<main id="app-main" class="container">
    <!-- 动态内容将由JavaScript渲染 -->
    <div id="page-content">加载中...</div>
</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2025 画之境 | 个人美术作品集 | 灵感源于生活与艺术</p>
    </div>
</footer>

        {
            id: 6,
            title: "《绿色条纹》",

            detailImg: "https://s41.ax1x.com/2026/03/26/peQgrxP.jpg",
            description: "绿色条纹》（或《马蒂斯夫人》）是法国艺术家亨利·马蒂斯于 1905 年创作的一幅油画，描绘的是他的妻子艾米丽·诺埃利·马蒂斯-帕拉伊尔。" +
                "标题源于马蒂斯夫人脸部中间的垂直绿色条纹，这一艺术选择与野兽派的技术和价值观相一致。" +
                "这幅画以大胆而鲜艳的色块呈现了马蒂斯夫人的半身像。由于这种非自然和实验性的色彩运用，它与野兽派运动有关",

            medium: "布面油画"
        }

    // ---------- 路由 & 页面渲染 ----------
    let currentPage = "list";      // 'list' 或 'detail' 或 'about'
    let currentArtId = null;

    // 获取DOM元素
    const appContent = document.getElementById('page-content');
    const navLinks = document.querySelectorAll('.nav-link');

    // 保存用户主题偏好 localStorage
    function loadThemePreference() {
        const savedTheme = localStorage.getItem('artTheme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            updateThemeButtonText(true);
        } else {
            document.body.classList.remove('dark');
            updateThemeButtonText(false);
        }
    }

    function updateThemeButtonText(isDark) {
        const btn = document.getElementById('themeToggleBtn');
        if (btn) {
            btn.innerHTML = isDark ? '☀️ 亮色主题' : '🌓 暗色主题';
        }
    }

    function setTheme(theme) {
        if (theme === 'dark') {
            document.body.classList.add('dark');
            localStorage.setItem('artTheme', 'dark');
            updateThemeButtonText(true);
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem('artTheme', 'light');
            updateThemeButtonText(false);
        }
    }

    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            setTheme('light');
        } else {
            setTheme('dark');
        }
    }

    // 高亮当前激活的导航
    function setActiveNav(pageId) {
        navLinks.forEach(link => {
            const page = link.getAttribute('data-page');
            if (page === pageId) {
                link.classList.add('active-nav');
            } else {
                link.classList.remove('active-nav');
            }
        });
    }

    // 渲染作品列表页 (网格布局)
    function renderListPage() {
        setActiveNav('list');
        let cardsHtml = `<section class="art-grid animate-fadeup">`;
        artworks.forEach(art => {
            cardsHtml += `
                <article class="art-card" data-id="${art.id}">
                    <img class="card-img" src="${art.thumbnail}" alt="${art.title}" loading="lazy">
                    <div class="card-info">
                        <h3>${art.title}</h3>
                        <p>${art.year} · ${art.medium}</p>
                    </div>
                </article>
            `;
        });
        cardsHtml += `</section>`;
        // 额外包装一下, 加上header语义说明
        const fullHtml = `
            <header style="margin-bottom:1rem;">
                <h2>📸 近期作品</h2>
                <p style="color: var(--text-secondary)">点击任一作品，探索艺术细节</p>
            </header>
            ${cardsHtml}
        `;
        appContent.innerHTML = fullHtml;
        // 绑定卡片点击跳转详情
        document.querySelectorAll('.art-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = parseInt(card.getAttribute('data-id'));
                showDetailPage(id);
            });
        });
    }

    // 详情页动态加载内容
    function renderDetailPage(artId) {
        const artwork = artworks.find(a => a.id === artId);
        if (!artwork) {
            renderListPage();
            return;
        }
        setActiveNav('list');  // 详情页逻辑上属于作品集导航高亮
        const detailHtml = `
            <div class="detail-container animate-fadeup">
                <img class="detail-img" src="${artwork.detailImg}" alt="${artwork.title}">
                <h1 class="detail-title">${artwork.title}</h1>
                <div class="detail-desc">
                    <p>${artwork.description}</p>
                    <p><strong>创作年份：</strong>${artwork.year}  |  <strong>媒介：</strong>${artwork.medium}</p>
                </div>
                <button class="back-link" id="backToListBtn">← 返回作品集</button>
            </div>
        `;
        appContent.innerHTML = detailHtml;
        const backBtn = document.getElementById('backToListBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                renderListPage();
                updateUrlForList();
                currentPage = "list";
                currentArtId = null;
            });
        }
    }

    // 关于我页面（增强内容展示）
    function renderAboutPage() {
        setActiveNav('about');
        const aboutHtml = `
            <section class="detail-container animate-fadeup" style="text-align: center;">
                <h1>🎨 关于艺术家</h1>
                <div style="margin: 2rem 0;">
                    <img src="https://picsum.photos/id/169/300/300" alt="artist portrait" style="border-radius: 50%; width: 160px; height: 160px; object-fit: cover; border: 4px solid var(--accent);">
                </div>
                <p style="font-size: 1.2rem; margin-bottom: 1rem;">刘毅丹 | 独立插画师 & 视觉设计师</p>

                    毕业于西安电子科技大学，作品专注于自然与城市之间的情感共振。擅长油画、数字绘画以及综合材料，多次参与国内外艺术展览。
                    坚信艺术是连接灵魂的语言，希望用色彩和构图传达治愈与思考。
                </p>
                <div style="margin-top: 2rem;">
                    <p>📧 Email: 3014197471@qq.com</p>
                    <p>📷 Instagram: @liuyidan23069100053</p>
                </div>
                <button class="back-link" id="aboutBackBtn" style="margin-top: 2rem;">浏览作品集</button>
            </section>
        `;
        appContent.innerHTML = aboutHtml;
        const backBtn = document.getElementById('aboutBackBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                renderListPage();
                updateUrlForList();
                currentPage = "list";
            });
        }
    }

    // 显示详情页 切换动态内容 (进阶功能动态加载)
    function showDetailPage(id) {
        currentArtId = id;
        currentPage = "detail";
        renderDetailPage(id);
        // 更新URL hash (简单支持前进后退)
        window.location.hash = `#/detail/${id}`;
    }

    function showListPage() {
        currentPage = "list";
        currentArtId = null;
        renderListPage();
        window.location.hash = '#/';
    }

    function showAboutPage() {
        currentPage = "about";
        renderAboutPage();
        window.location.hash = '#/about';
    }

    // 根据hash路由解析
    function handleRouting() {
        const hash = window.location.hash.slice(1) || '/';
        if (hash === '/') {
            showListPage();
        } else if (hash === '/about') {
            showAboutPage();
        } else if (hash.startsWith('/detail/')) {
            const idStr = hash.split('/')[2];
            const id = parseInt(idStr);
            if (!isNaN(id) && artworks.find(a => a.id === id)) {
                currentPage = "detail";
                currentArtId = id;
                renderDetailPage(id);
            } else {
                showListPage();
            }
        } else {
            showListPage();
        }
    }

    // 辅助更新列表URL
    function updateUrlForList() {
        if (window.location.hash !== '#/') {
            window.location.hash = '#/';
        }
    }

    // 导航菜单监听（不依赖hash，手动触发切换，但保持URL同步）
    function bindNavEvents() {
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.getAttribute('data-page');
                if (page === 'list') {
                    showListPage();
                } else if (page === 'about') {
                    showAboutPage();
                }
            });
        });
    }

    // 初始化与主题切换事件
    function initTheme() {
        const themeBtn = document.getElementById('themeToggleBtn');
        themeBtn.addEventListener('click', toggleTheme);
        loadThemePreference();
    }

    // 额外基本动态效果: 鼠标跟随卡片阴影增强(可选)，或者首页欢迎alert小彩蛋不再用，使用控制台友好。
    // 但满足自己设计的基本动态效果：添加滚动页面时头部背景加深? 其实简单给每个卡片添加进入动画和悬停js附加动态（已经css hover）
    // 增加一个动态小功能：控制台输出问候，并且显示当前主题状态；另外添加加载欢迎toast风格通知（轻提示）简洁实现一个欢迎交互
    function initAdditionalDynamicEffects() {
        // 页面载入后，显示一个简短的控制台艺术气息和动态提醒，不干扰用户体验，但证明javascript交互设计
        console.log("%c✨ 画之境已加载 | 欢迎欣赏美术作品 ✨", "color: #c47a44; font-size: 16px");
        // 增加简单footer年份动态更新
        const footerPara = document.querySelector('.site-footer p');
        if (footerPara) {
            const year = new Date().getFullYear();
            if(!footerPara.innerText.includes('2025')) {
                footerPara.innerText = `© ${year} 画之境 | 个人美术作品集 | 灵感源于生活与艺术`;
            }
        }
        // 动画观察者：为所有出现元素添加类（全局fadeup简单方式已在容器类使用，无需额外）
    }

    // 首次渲染路由启动器
    function init() {
        bindNavEvents();
        initTheme();
        handleRouting();        // 基于hash加载初始内容
        window.addEventListener('hashchange', handleRouting);
        initAdditionalDynamicEffects();
    }

    // 如果页面直接加载无hash，手动设置
    window.addEventListener('DOMContentLoaded', () => {
        if (!window.location.hash || window.location.hash === '') {
            window.location.hash = '#/';
        } else {
            init(); // 避免重复初始化
        }
        init(); // 安全调用
    });
    // 确保重复调用不冲突，但已经OK
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
